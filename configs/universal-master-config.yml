# ======================================================================================#
#                 UNIVERSAL WEBLOGIC OBSERVABILITY PROFILE                              #
#                       Master Exporter Configuration                                   #
# ======================================================================================#
# REPOSITORY:   https://github.com/lumawisme/weblogic-monitoring-exporter               #
# AUTHOR:       Lu Maw                                                                  #
# CREDITS:      Original exporter engine by Oracle Corporation                          #
#               (https://github.com/oracle/weblogic-monitoring-exporter)                #
# DATE:         May 2026                                                                #      
# VERSION:      v1.0.0                                                                  #
#                                                                                       # 
# DESCRIPTION:  This is the universal telemetry standard for WebLogic monitoring.       #
#               Engineered to be lean, fast, and drop-in ready for any environment      #
#               (Standalone, Clustered, VM, or Containerized). Includes core metrics    #
#               and a pre-staged dictionary of subsystems for rapid scaling.            #
#                                                                                       #
# GUIDELINES:   1. ONLY numeric attributes are allowed in `values: []` arrays.          #
#               2. Uncomment subsystems in the INACTIVE section as needed.              #
# ======================================================================================#

# Optional, used in the web application only. Overrides the port on which the exporter should contact the REST API. 
# restPort: 9002 

# Appends the basic authentication credentials provided by the monitoring tool to the internal WebLogic REST API request.
appendCredentials: true 

# If true, metrics names will be converted to snake case. Defaults to false.
metricsNameSnakeCase: true 

# If true, the domain name will be included as a qualifier for all metrics. Defaults to false.
domainQualifier: true

queries:
# ==============================================================================
# --- ACTIVE METRICS (Core Infrastructure) ---                                 #
# ==============================================================================

# 1. Server Lifecycle & Health 
- key: name
  prefix: wls_server_
  values: [stateVal, activationTime, openSocketsCurrentCount, adminServerListenPort, restartsTotalCount, socketsOpenedTotalCount, listenPort]
  overallHealthState:
    prefix: wls_server_overallhealth_
    stringValues:
      state: [ok,failed,overloaded,critical,warn]
  healthState:
    prefix: wls_server_health_
    stringValues:
      state: [ok,failed,overloaded,critical,warn]

# 2. JVM Memory Core
- key: name
  keyName: server
  JVMRuntime:
    prefix: jvm_
    key: name
    values: [heapFreeCurrent, heapFreePercent, heapSizeCurrent, heapSizeMax, uptime]

# 3. JDBC Connection Pools 
- JDBCServiceRuntime:
    JDBCDataSourceRuntimeMBeans:
      prefix: jdbc_
      key: name
      values: [ActiveConnectionsCurrentCount, LeakedConnectionCount, WaitingForConnectionCurrentCount, CurrCapacity]

# 4. Thread Pool 
- key: name
  keyName: server
  ThreadPoolRuntime:
    prefix: threadpool_
    key: name
    values: [Throughput, ExecuteThreadTotalCount, ExecuteThreadIdleCount, HoggingThreadCount, PendingUserRequestCount, StuckThreadCount]

# 5. JTA Transactions
- JTARuntime:
    prefix: wls_jta_
    key: name
    values: [transactionCommittedTotalCount, transactionTotalCount, transactionRolledBackTotalCount, activeTransactionsTotalCount]

# 6. JMS Queues
- JMSRuntime:
    JMSServers:
      key: name
      destinations:
        prefix: jms_
        key: name
        values: [MessagesCurrentCount, MessagesPendingCount, ConsumersCurrentCount]

# 7. Web Application & Work Manager Runtimes
- key: name
  keyName: server
  applicationRuntimes:
    key: name
    keyName: app
    workManagerRuntimes:
      prefix: workmanager_
      key: applicationName
    componentRuntimes:
      type: WebAppComponentRuntime
      prefix: webapp_config_
      key: name
      values: [deploymentState, openSessionsCurrentCount, openSessionsHighCount]

# 8. Security & Logins
- ServerSecurityRuntime:
    prefix: wls_security_
    values: [lockedUsersCurrentCount, invalidLoginAttemptsTotalCount, invalidLoginUsersHighCount]

# 9. Server Network Channels
- key: name
  keyName: server
  ServerChannelRuntimes:
    prefix: wls_channel_
    key: channelName
    values: [acceptCount, messagesReceivedCount, messagesSentCount]


# ==============================================================================
# --- INACTIVE METRICS (Uncomment to enable specific subsystems) ---           # 
# ==============================================================================

